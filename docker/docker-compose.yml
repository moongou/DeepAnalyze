# Docker Compose configuration for DeepAnalyze
# Usage: docker-compose up -d
# All-in-one: Backend API + Frontend + Model Server

version: '3.8'

services:
  deepanalyze:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: deepanalyze:latest
    container_name: deepanalyze

    # GPU support (comment out for CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Port mapping: Model API, Backend API, File Server, Frontend
    ports:
      - "8000:8000"
      - "8200:8200"
      - "8100:8100"
      - "4000:4000"

    # Volume mounts
    volumes:
      # Model weights (mount from host to avoid re-downloading)
      - ../DeepAnalyze-8B:/app/DeepAnalyze-8B:ro
      # Persistent workspace data
      - deepanalyze-workspace:/app/demo/chat/workspace
      # Persistent project data
      - deepanalyze-projects:/app/demo/chat/projects
      # Persistent database
      - deepanalyze-db:/app/demo/chat/
      # Logs
      - deepanalyze-logs:/app/logs
      # Chinese fonts (assets)
      - ../assets/fonts:/app/assets/fonts:ro

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MPLBACKEND=Agg
      - PYTHONUNBUFFERED=1

    # Startup command
    command: /bin/bash /app/start_all.sh

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/api/settings/hardware"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  deepanalyze-workspace:
  deepanalyze-projects:
  deepanalyze-db:
  deepanalyze-logs:
